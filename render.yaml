services:
  - type: web
    name: multi-agents-ui
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: RENDER_KNOWLEDGE_AGENT_URL
        sync: false
      - key: RENDER_RCA_AGENT_URL
        sync: false
      - key: RENDER_CODEGEN_AGENT_URL
        sync: false
      - key: RENDER_AUTOFIX_AGENT_URL
        sync: false
      - key: RENDER_KNOWLEDGE_UPLOAD_URL
        sync: false
